<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Smart Shopping Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Smart Shopping Hub</h1>

    <input
        type="text"
        id="search"
        placeholder="Search Product"
    >
    <!-- Task 2-->
    <div class="buttons">
        <button data-category="all">All</button>
        <button data-category="men's clothing">
        Men's Clothing
        </button>
        <button data-category="women's clothing">
            Women's Clothing
        </button>
        <button data-category="jewelery">
            Jewelery
        </button>
        <button data-category="electronics">
            Electronics
        </button>
    </div>
<!--task 3-->
    <div class="sortButtons">
    <button id="lowHigh">Low → High</button>
    <button id="highLow">High → Low</button>
</div>


<!-- task 4-->
 <div id="modal" class="modal">
    <div class="modalContent">
        <span id="close">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>
<!-- Task 5 -->
<div class="cartHeader">
    <h2> Purchase List</h2>
    <h3 id="cartCount">
       Add Items : 0
    </h3>
</div>
<div id="cart"></div>
<div id="products"></div>
    <script src="script.js"></script>

</body>
</html>
